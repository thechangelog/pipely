enrichment_tables:
  geoip:
    type: "mmdb"
    path: "/usr/local/share/GeoIP/GeoLite2-City.mmdb"

transforms:
  varnish_geoip:
    type: "remap"
    inputs:
      - "varnish"
    source: |
      geoip_data, err = get_enrichment_table_record("geoip", {"ip": .client_ip})
      if err == null {
        .geo_city = geoip_data.city.names.en
        .geo_country_code = geoip_data.country.iso_code
        .geo_country_name = geoip_data.country.names.en
        .geo_continent_code = geoip_data.continent.code
        .geo_latitude = geoip_data.location.latitude
        .geo_longitude = geoip_data.location.longitude
      }

  s3_csv:
    type: "remap"
    inputs:
      - "varnish_geoip"
    source: |
      formatted_time = format_timestamp!(now(), "%d/%b/%Y:%H:%M:%S %z")
      parsed_time, err = parse_timestamp(.time, "%+")
      if err == null {
        formatted_time = format_timestamp!(parsed_time, "%d/%b/%Y:%H:%M:%S %z")
      }

      values = [
        to_string!(.client_ip || ""),
        "[" + formatted_time + "]",
        replace!(.url || "", "\\?.*$", ""),
        to_string!(.resp_body_size || ""),
        to_string!(.status || ""),
        "\"" + to_string!(.request_user_agent) + "\"",
        to_string!(.geo_latitude || ""),
        to_string!(.geo_longitude || ""),
        "\"" + downcase!(.geo_city || "") + "\"",
        to_string!(.geo_continent_code || "") ,
        to_string!(.geo_country_code || ""),
        "\"" + downcase!(.geo_country_name || "") + "\""
      ]

      .message = {
        .url = .url
        .csv = join!(values, ",")
      }

  s3_csv_changelog:
    type: "remap"
    inputs:
      - "s3_csv"
    source: |
      if starts_with(string!(.url), "/uploads/podcast/") {
        .message = .csv
      } else {
        abort
      }

  s3_csv_gotime:
    type: "remap"
    inputs:
      - "s3_csv"
    source: |
      if starts_with(string!(.url), "/uploads/gotime/") {
        .message = .csv
      } else {
        abort
      }

  s3_csv_rfc:
